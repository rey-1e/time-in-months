<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">

    <!-- Header -->
    <div class="popup-header">
      <h3>Moments</h3>
      <p>Configure Your Visual Timeline</p>
    </div>

    <!-- Settings Form -->
    <form id="popup-form" novalidate>

      <!-- Birth Date Row -->
      <div class="section-label">Date of Birth</div>
      <div class="input-row">
        <div class="input-group">
          <label for="pop-day">Day</label>
          <input type="number" id="pop-day" min="1" max="31" placeholder="15" required autocomplete="off">
        </div>
        <div class="input-group">
          <label for="pop-month">Month</label>
          <input type="number" id="pop-month" min="1" max="12" placeholder="04" required autocomplete="off">
        </div>
        <div class="input-group">
          <label for="pop-year">Year</label>
          <input type="number" id="pop-year" min="1900" max="2100" placeholder="1999" required autocomplete="off">
        </div>
      </div>

      <!-- Life Expectancy Row -->
      <div class="section-label" style="margin-top: 14px;">Life Expectancy</div>
      <div class="expectancy-row">
        <input
          type="number"
          id="pop-expectancy"
          min="50"
          max="120"
          placeholder="90"
          autocomplete="off"
          aria-label="Life expectancy in years"
        >
        <span class="expectancy-unit">years</span>
        <button type="button" id="help-btn" class="help-btn" title="How is this calculated?">?</button>
      </div>

      <!-- Theme Selector Row -->
      <div class="section-label" style="margin-top: 16px;">Color Theme</div>
      <div id="theme-grid" class="theme-grid"></div>

      <!-- Validation Error -->
      <div id="error-bubble" class="error-bubble hidden" role="alert" aria-live="polite"></div>

      <!-- Save Button -->
      <button type="submit" class="submit-btn" id="submit-btn">Save Settings</button>

      <!-- Success Flash -->
      <div id="success-msg" class="success-msg hidden" aria-live="polite">✓ Theme & Settings Applied</div>

    </form>

  </div>
  <script src="popup.js"></script>
</body>
</html>
