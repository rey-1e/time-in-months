<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48' height='16' width='16'%3E%3Cdefs%3E%3ClinearGradient id='a' x1='3.2173' y1='15' x2='44.7812' y2='15' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%23d93025'/%3E%3Cstop offset='1' stop-color='%23ea4335'/%3E%3C/linearGradient%3E%3ClinearGradient id='b' x1='20.7219' y1='47.6791' x2='41.5039' y2='11.6837' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%23fcc934'/%3E%3Cstop offset='1' stop-color='%23fbbc04'/%3E%3C/linearGradient%3E%3ClinearGradient id='c' x1='26.5981' y1='46.5015' x2='5.8161' y2='10.506' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%231e8e3e'/%3E%3Cstop offset='1' stop-color='%2334a853'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='24' cy='23.9947' r='12' fill='%23fff'/%3E%3Cpath d='M24,12H44.7812a23.9939,23.9939,0,0,0-41.5639.0029L13.6079,30l.0093-.0024A11.9852,11.9852,0,0,1,24,12Z' fill='url(%23a)'/%3E%3Ccircle cx='24' cy='24' r='9.5' fill='%231a73e8'/%3E%3Cpath d='M34.3913,30.0029,24.0007,48A23.994,23.994,0,0,0,44.78,12.0031H23.9989l-.0025.0093A11.985,11.985,0,0,1,34.3913,30.0029Z' fill='url(%23b)'/%3E%3Cpath d='M13.6086,30.0031,3.218,12.006A23.994,23.994,0,0,0,24.0025,48L34.3931,30.0029l-.0067-.0068a11.9852,11.9852,0,0,1-20.7778.007Z' fill='url(%23c)'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="newtab.css">
</head>
<body>

  <!-- ONBOARDING SCREEN -->
  <div id="onboarding-screen" class="hidden">
    <div class="onboarding-card">
      <h2>Welcome to Moments</h2>
      <p>Enter your exact date of birth to initialize your visual timeline map.</p>
      <form id="onboarding-form" novalidate>
        <div class="exact-input-row">
          <div class="input-cell">
            <label for="ob-day">Day</label>
            <input type="number" id="ob-day" placeholder="15" min="1" max="31" required autocomplete="off">
          </div>
          <div class="input-cell">
            <label for="ob-month">Month</label>
            <input type="number" id="ob-month" placeholder="4" min="1" max="12" required autocomplete="off">
          </div>
          <div class="input-cell">
            <label for="ob-year">Year</label>
            <input type="number" id="ob-year" placeholder="1999" min="1900" max="2100" required autocomplete="off">
          </div>
        </div>
        <div id="ob-error-bubble" class="error-bubble hidden" role="alert" aria-live="polite">Invalid</div>
        <button type="submit" class="submit-action-btn">Initialize Map</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD SCREEN -->
  <main id="app-container" class="hidden" role="main">

    <div class="center-block">

      <!-- Digital Clock -->
      <section class="clock-segment" aria-label="Current time">
        <div class="digital-time" aria-live="off">
          <span id="hours">00</span>
          <span class="divider-colon" aria-hidden="true">:</span>
          <span id="minutes">00</span>
          <span class="divider-colon" aria-hidden="true">:</span>
          <span id="seconds">00</span>
          <span id="milliseconds" class="ms" hidden aria-hidden="true"></span>
        </div>
        <div class="time-label" aria-hidden="true">TIME KEEPS MOVING</div>
      </section>

      <!-- Life Calendar Grid -->
      <section class="map-grid-segment" aria-label="Life calendar">
        <div class="grid-labels">
          <span id="scroll-state-label" class="grid-lbl-left">--</span>
          <span id="active-month-label" class="grid-lbl-right">--</span>
        </div>
        <div id="canvas-grid" class="canvas-grid" role="img" aria-label="Life months visualization"></div>
        <div class="grid-footer-labels">
          <span id="hover-month-count">MONTH --</span>
          <span id="timeline-span-limit">AGE 90</span>
        </div>
      </section>

    </div>

    <!-- Bottom Stats -->
    <div class="bottom-controls-bar">
      <div class="metrics-columns" role="region" aria-label="Life statistics">
        <div class="metric-block orange-highlight">
          <span id="lived-counter" class="metric-num" aria-label="Months lived">--</span>
          <span class="metric-title">MONTHS LIVED</span>
        </div>
        <div class="metric-block gray-highlight">
          <span id="left-counter" class="metric-num" aria-label="Months remaining">--</span>
          <span class="metric-title">MONTHS LEFT</span>
        </div>
        <div class="metric-block green-highlight">
          <span id="percent-counter" class="metric-num" aria-label="Percentage of life lived">--%</span>
          <span class="metric-title">OF YOUR LIFE</span>
        </div>
      </div>
    </div>

  </main>

  <script src="newtab.js"></script>
</body>
</html>
